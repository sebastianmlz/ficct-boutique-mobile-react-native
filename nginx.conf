# Reverse proxy + static server for the React Native Expo Web bundle.
# Sits on the same docker network as go-core/django-ai so the bundle can
# use same-origin relative URLs (no cross-container localhost issues).
server {
  listen 80;
  server_name _;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # GraphQL → Go core
  location /graphql {
    proxy_pass http://go-core:8080/graphql;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    client_max_body_size 50m;
  }

  # Seeded product SVG placeholders served by Go.
  location /static/ {
    proxy_pass http://go-core:8080/static/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # AI service (Django) — strip /api/ai prefix
  location /api/ai/ {
    rewrite ^/api/ai/(.*)$ /$1 break;
    proxy_pass http://django-ai:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    client_max_body_size 50m;
  }

  # Static RN web bundle
  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
